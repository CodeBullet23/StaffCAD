{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">Staff Members</h2>

<a class="btn btn-success mb-3" href="{{ url_for('staff.add_staff') }}">Add Staff</a>

<table class="table table-dark table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
            <th>Must Change Password</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>
            <td>{{ "Yes" if user.must_change_password else "No" }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
