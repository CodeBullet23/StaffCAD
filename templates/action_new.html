{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">Log New Action</h2>
<form method="post">
  <div class="mb-3">
    <label class="form-label">Target user (name / ID)</label>
    <input class="form-control" type="text" name="target_user" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Platform</label>
    <select class="form-select" name="platform" required>
      <option value="">Select platform</option>
      <option value="discord">Discord</option>
      <option value="roblox">Roblox</option>
      <option value="fivem">FiveM</option>
      <option value="other">Other</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Action type</label>
    <select class="form-select" name="action_type" required>
      <option value="">Select type</option>
      <option value="warn">Warn</option>
      <option value="ban">Ban</option>
      <option value="kick">Kick</option>
      <option value="note">Note</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Reason</label>
    <textarea class="form-control" name="reason" rows="3" required></textarea>
  </div>

  <button class="btn btn-success" type="submit">Save</button>
  <a class="btn btn-secondary" href="{{ url_for('actions.dashboard') }}">Cancel</a>
</form>
{% endblock %}
